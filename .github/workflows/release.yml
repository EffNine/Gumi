name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release archives
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          # Fall back to a ISO-formatted UTC date if the commit timestamp is unavailable.
          if [ -z "$BUILD_DATE" ]; then
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          fi
          ./scripts/build-release.sh "$VERSION" "$COMMIT" "$BUILD_DATE"

      - name: Verify release archives
        run: ./scripts/check-release.sh "${{ github.ref_name }}"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/*
          draft: true
          prerelease: true
