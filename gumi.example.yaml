# Gumi example configuration
#
# Copy this file to one of the following locations:
#   - ~/.gumi/gumi.yaml
#   - ./gumi.yaml (project-local)
#
# Environment variables override any YAML values:
#   GUMI_PROVIDER_DEFAULT=lmstudio
#   GUMI_LMSTUDIO_URL=http://192.168.0.164:1234/v1
#   GUMI_DEFAULT_MODEL=ornith-1.0-9b@q4_k_m
#   GUMI_PROVIDER_TIMEOUT_SECONDS=120
#
# This file intentionally contains no real secrets and keeps external telemetry
# disabled. Prompts and responses are not logged by default.

runtime:
  name: gumi
  mode: stabilized
  host: 127.0.0.1
  port: 8787
  environment: local
  log_level: info
  agent:
    max_steps: 30
    tool_call_timeout_seconds: 120
    context_compaction_threshold: 0.85
    loop_detection: strict

dashboard:
  enabled: true
  host: 127.0.0.1
  port: 8788

auth:
  mode: local
  local_key: gumi-local

provider:
  default: ollama

providers:
  ollama:
    enabled: true
    url: http://localhost:11434
    default_model: local:auto
    timeout_seconds: 60
  lmstudio:
    enabled: true
    url: http://localhost:1234/v1
    default_model: local:auto
    timeout_seconds: 60
  openai_compatible_local:
    enabled: true
    url: http://localhost:8000/v1
    default_model: local:auto
    timeout_seconds: 60

storage:
  engine: sqlite
  database_path: ~/.gumi/gumi.db
  retain_days: 14

telemetry:
  local: true
  external: false
  log_prompts: false
  log_responses: false
  retain_days: 14

