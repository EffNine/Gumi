suite:
  id: instruction-hard
  category: instruction
  tier: hard
  description: "Instruction following with 5-7 simultaneous constraints (20 tests)"
  target_direct_score: "0.20-0.50"
  model_profiles: [medium, frontier]
  attempts_recommended: 5
  tests:
    - id: inst-hard-01
      difficulty: hard
      description: "6 sentences, JSON, no the, capital starts, end with done, no commas"
      prompt: |
        Write exactly 6 sentences about space exploration. Return as valid JSON with key "response" and a string value.
        Do not use the word "the". Each sentence must start with a capital letter.
        End with the word "done". Do not use any commas.
      timeout_seconds: 60
      max_tokens: 1024
      constraints:
        - field: json
          operator: valid
        - field: forbidden_words
          operator: not_contains
          value: ["the"]
        - field: capital_start
          operator: eq
          value: true
        - field: ends_with
          operator: ends_with
          value: "done"
        - field: no_commas
          operator: eq
          value: true

    - id: inst-hard-02
      difficulty: hard
      description: "8 bullets, no markdown, capital start, end with scale"
      prompt: |
        Write 8 bullet points about the future of renewable energy.
        Use dash bullets. Do not use markdown fences.
        Start each bullet with a capital letter.
        End the entire response with the word "scale".
      timeout_seconds: 60
      max_tokens: 1024
      constraints:
        - field: no_markdown
          operator: eq
          value: true
        - field: capital_start
          operator: eq
          value: true
        - field: ends_with
          operator: ends_with
          value: "scale"

