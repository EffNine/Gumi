id: qwen3-8b
name: Qwen3 8B
version: 1
family: qwen
size: 8b
type: instruct

aliases:
  - qwen3:8b
  - qwen3:latest

models:
  ollama:
    - qwen3:8b
    - qwen3:latest
  lmstudio:
    - qwen3-8b
    - qwen3-8b-instruct
  openai_compatible_local:
    - qwen3-8b

capabilities:
  chat: true
  streaming: true
  structured_output: medium
  json_mode: medium
  tool_calling: weak
  vision: false
  long_context: medium
  coding: strong
  reasoning: medium
  creative_writing: medium

defaults:
  temperature: 0.4
  top_p: 0.9
  repeat_penalty: 1.12
  max_tokens: 4096

context:
  strategy: hybrid
  max_input_tokens: 24000
  preserve_recent_messages: 8
  compression: true

prompt:
  style: technical
  instruction_strength: strong
  json_instruction_style: explicit
  system_prompt_style: direct
  instructions:
    - Answer technical questions clearly and accurately.
    - For structured output, return only the requested JSON. Do not wrap it in markdown fences.
    - Avoid repeating the same sentence or explanation.

guard:
  anti_loop: aggressive
  context_overflow: true
  structured_output: true
  json_repair: true
  repetition_detection: true

notes:
  - Good general-purpose technical local model.
  - May repeat when context is too long.
  - Requires explicit JSON-only instructions for structured output.
  - May over-explain simple answers.
