id: generic-local
name: Generic Local Model
version: 1
family: unknown
size: unknown
type: instruct

capabilities:
  chat: true
  streaming: false
  structured_output: weak
  json_mode: weak
  tool_calling: unknown
  vision: false
  long_context: unknown
  coding: unknown
  reasoning: unknown
  creative_writing: unknown

defaults:
  temperature: 0.5
  top_p: 0.9
  repeat_penalty: 1.1
  max_tokens: 2048

context:
  strategy: hybrid
  max_input_tokens: 8000
  preserve_recent_messages: 6
  compression: true

prompt:
  style: general
  instruction_strength: standard
  json_instruction_style: explicit
  system_prompt_style: direct

guard:
  anti_loop: standard
  context_overflow: true
  structured_output: true
  json_repair: true
  repetition_detection: true

notes:
  - Unknown model profile. Conservative settings applied.
