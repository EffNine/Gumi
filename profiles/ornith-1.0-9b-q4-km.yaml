id: ornith-1.0-9b-q4-km
name: Ornith 1.0 9B Q4_K_M
version: 1
family: ornith
size: 9b
type: chat

aliases:
  - ornith:9b
  - ornith:latest

models:
  ollama:
    - ornith:9b
    - ornith:latest
  lmstudio:
    - ornith-1.0-9b@q4_k_m
  openai_compatible_local:
    - ornith-1.0-9b-q4-km

capabilities:
  chat: true
  streaming: true
  structured_output: medium
  json_mode: medium
  tool_calling: weak
  vision: false
  long_context: medium
  coding: medium
  reasoning: medium
  creative_writing: medium

defaults:
  temperature: 0.4
  top_p: 0.9
  repeat_penalty: 1.12
  max_tokens: 1024
  thinking: false

context:
  strategy: hybrid
  max_input_tokens: 12000
  preserve_recent_messages: 8
  compression: true

prompt:
  style: general
  instruction_strength: strong
  json_instruction_style: explicit
  system_prompt_style: direct
  instructions:
    - Answer concisely and directly. Do not include reasoning or chain-of-thought.
    - For one-word or exact-format prompts, output only the requested final content.
    - Do not wrap normal plain-text answers in JSON unless JSON or structured output is explicitly requested.
    - When the user asks for JSON, return ONLY the raw JSON object. No markdown fences, no code blocks, no explanation before or after.
    - Avoid repeating the same sentence or explanation.
    - If you are uncertain, state uncertainty once and stop.

guard:
  anti_loop: standard
  context_overflow: true
  structured_output: true
  json_repair: true
  repetition_detection: true

notes:
  - 9B model with Q4_K_M quantization. Good general-purpose chat model.
  - Thinking is disabled by default to avoid exhausting max_tokens on reasoning.
  - Validated with LM Studio model ornith-1.0-9b@q4_k_m (21/21 Novexa passes, Good baseline, direct p50 182ms).
