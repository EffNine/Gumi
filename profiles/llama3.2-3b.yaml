id: llama3.2-3b
name: Llama 3.2 3B
version: 1
family: llama
size: 3b
type: instruct

aliases:
  - llama3.2:3b
  - llama3.2:latest

models:
  ollama:
    - llama3.2:3b
    - llama3.2:latest
  lmstudio:
    - llama-3.2-3b
    - llama-3.2-3b-instruct
  openai_compatible_local:
    - llama-3.2-3b

capabilities:
  chat: true
  streaming: true
  structured_output: medium
  json_mode: medium
  tool_calling: weak
  vision: false
  long_context: weak
  coding: weak
  reasoning: weak
  creative_writing: medium

defaults:
  temperature: 0.15
  top_p: 0.8
  repeat_penalty: 1.18
  max_tokens: 512
  thinking: false

context:
  strategy: hybrid
  max_input_tokens: 4000
  preserve_recent_messages: 4
  compression: true

prompt:
  style: general
  instruction_strength: strict
  json_instruction_style: explicit
  system_prompt_style: direct
  instruction_assist: true
  instructions:
    - Answer concisely and directly. Do not include reasoning or chain-of-thought.
    - For one-word or exact-format prompts, output only the requested final content.
    - For math questions, answer with the numeric digit only. Example: "4" not "Four". Never spell out numbers.
    - When the user says "answer in one word" for a math question, reply with a single digit like "4".
    - For factual questions, answer with the exact word requested. Example: "Paris" not "The capital of France is Paris".
    - Do not wrap normal plain-text answers in JSON unless JSON or structured output is explicitly requested.
    - When the user asks for JSON, return ONLY the raw JSON object. No markdown fences, no code blocks, no explanation before or after.
    - Avoid repeating the same sentence or explanation.
    - If you are uncertain, state uncertainty once and stop.

guard:
  anti_loop: aggressive
  context_overflow: true
  structured_output: true
  json_repair: true
  repetition_detection: true

notes:
  - Small 3B model. Good for quick general chat and simple tasks.
  - Thinking is disabled by default to avoid exhausting max_tokens on reasoning.
  - Requires strict instruction formatting for JSON output.
  - Tuned 2026-07-17 from local Ollama baseline (Profile Doctor): lower temperature for exact-format prompts.
  - Prefer stabilized or structured mode for JSON-sensitive calls; lightweight often fences JSON.
  - Instruction assist enforces digit-only answers for math + one-word prompts.
