id: deepseek-r1-8b
name: DeepSeek R1 8B
version: 1
family: deepseek
size: 8b
type: reasoning

aliases:
  - deepseek-r1:8b
  - deepseek-r1:latest

models:
  ollama:
    - deepseek-r1:8b
    - deepseek-r1:latest
  lmstudio:
    - deepseek-r1-8b
  openai_compatible_local:
    - deepseek-r1-8b

capabilities:
  chat: true
  streaming: true
  structured_output: weak
  json_mode: weak
  tool_calling: weak
  vision: false
  long_context: medium
  coding: medium
  reasoning: strong
  creative_writing: medium

defaults:
  temperature: 0.5
  top_p: 0.9
  repeat_penalty: 1.12
  max_tokens: 4096

context:
  strategy: hybrid
  max_input_tokens: 16000
  preserve_recent_messages: 6
  compression: true

prompt:
  style: reasoning
  instruction_strength: standard
  json_instruction_style: explicit
  system_prompt_style: direct
  instruction_assist: true
  instructions:
    - Show reasoning briefly, then give the final answer.
    - For structured output, return only valid JSON and no explanatory prose.
    - Avoid verbose repetition of earlier reasoning.

guard:
  anti_loop: aggressive
  context_overflow: true
  structured_output: true
  json_repair: true
  repetition_detection: true

notes:
  - Reasoning-oriented local model.
  - May include reasoning-like text when structured output is requested.
  - May require strict instruction to avoid verbose output.
